name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements.lock.txt
      - name: Install frontend dependencies
        run: npm.cmd --prefix frontend ci
      - name: Python compile and regression tests
        shell: pwsh
        run: |
          python -m compileall -q infrastructure input monitoring reporting ui utils static config core database run_proctor_engine.py run_fastapi_backend.py scripts
          python -m unittest discover -s tests -v
      - name: Frontend typecheck
        run: npm.cmd --prefix frontend run typecheck -- --pretty false
      - name: Frontend build
        run: npm.cmd --prefix frontend run build -- --logLevel error
